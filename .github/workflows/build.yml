# Baut alle Verteil-Bundles auf GitHub-Runnern -- PyInstaller kann nicht
# cross-kompilieren, deshalb je Plattform ein eigener Runner.
#
# Drei Varianten, EINE Versionsnummer (APP_VERSION in yugioh_db.py):
#   - windows (windows-latest): One-Folder-Bundle mit .exe
#   - arm64   (macos-latest):   Apple Silicon, MacBooks ab ca. 2021
#   - x86_64  (macos-15-intel): aeltere Intel-Macs; GitHub bietet diesen
#     Runner noch bis August 2027 an, danach endet der Intel-Support.
#
# Ausloeser:
#   - manuell ueber den Actions-Tab ("Run workflow") -> Ergebnis als Artefakt
#     (Download erfordert GitHub-Login; ZIP dann selbst weitergeben)
#   - Git-Tag "v*" (z.B. v0.2.0) -> alle drei ZIPs haengen an EINEM
#     gemeinsamen GitHub-Release und sind OHNE Login oeffentlich
#     herunterladbar. Der Tag muss zur APP_VERSION passen.

name: Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # fuer das Anhaengen ans Release bei Tag-Builds

# Ab 2026-06-16 erzwingt GitHub Node 24 fuer JavaScript-Actions; hier schon
# jetzt aktiv, damit der Workflow nicht am Stichtag ueberraschend bricht.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Seed-Datenbank erzeugen (YGOPRODeck-API)
        run: python yugioh_db.py build seed.sqlite3

      - name: App bauen
        run: python build_app.py

      - name: Bundle paketieren (Ordner + Anleitung)
        # TESTER_LIESMICH.txt legt build_app.py bereits in den Ordner.
        run: Compress-Archive -Path dist/YugiohSammlung -DestinationPath YugiohSammlung-windows.zip

      - uses: actions/upload-artifact@v5
        with:
          name: YugiohSammlung-windows
          path: YugiohSammlung-windows.zip

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Seed-Datenbank erzeugen (YGOPRODeck-API)
        run: python yugioh_db.py build seed.sqlite3

      - name: App bauen
        run: python build_app.py

      - name: Bundle paketieren (.app + Anleitung)
        # Eigenes ditto-Zip statt nur upload-artifact: das Artefakt-Zippen
        # von GitHub verwirft Ausfuehrungsrechte, dann startet die .app nicht.
        run: |
          mkdir -p out/YugiohSammlung-macos-${{ matrix.arch }}
          cp -R dist/YugiohSammlung.app out/YugiohSammlung-macos-${{ matrix.arch }}/
          cp TESTER_LIESMICH.txt out/YugiohSammlung-macos-${{ matrix.arch }}/
          ditto -c -k --keepParent out/YugiohSammlung-macos-${{ matrix.arch }} YugiohSammlung-macos-${{ matrix.arch }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: YugiohSammlung-macos-${{ matrix.arch }}
          path: YugiohSammlung-macos-${{ matrix.arch }}.zip

  # Eigener Job statt Release-Schritt je Matrix-Eintrag: alle Builds haengen
  # ihre ZIPs gesammelt an, ohne sich beim Anlegen des Release zu ueberholen.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"

# Baut das macOS-Bundle (.app) auf GitHub-Runnern -- PyInstaller kann
# nicht cross-kompilieren, und ein eigener Mac steht nicht zur Verfuegung.
#
# Zwei Varianten:
#   - arm64  (macos-latest):   Apple Silicon, MacBooks ab ca. 2021
#   - x86_64 (macos-15-intel): aeltere Intel-Macs; GitHub bietet diesen
#     Runner noch bis August 2027 an, danach endet der Intel-Support.
#
# Ausloeser:
#   - manuell ueber den Actions-Tab ("Run workflow") -> Ergebnis als Artefakt
#     (Download erfordert GitHub-Login; ZIP dann selbst weitergeben)
#   - Git-Tag "v*" (z.B. v0.1.0) -> beide ZIPs haengen zusaetzlich am
#     GitHub-Release und sind OHNE Login oeffentlich herunterladbar

name: macOS-Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # fuer das Anhaengen ans Release bei Tag-Builds

# Ab 2026-06-16 erzwingt GitHub Node 24 fuer JavaScript-Actions; hier schon
# jetzt aktiv, damit der Workflow nicht am Stichtag ueberraschend bricht.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Seed-Datenbank erzeugen (YGOPRODeck-API)
        run: python yugioh_db.py build seed.sqlite3

      - name: App bauen
        run: python build_app.py

      - name: Bundle paketieren (.app + Anleitung)
        # Eigenes ditto-Zip statt nur upload-artifact: das Artefakt-Zippen
        # von GitHub verwirft Ausfuehrungsrechte, dann startet die .app nicht.
        run: |
          mkdir -p out/YugiohSammlung-macos-${{ matrix.arch }}
          cp -R dist/YugiohSammlung.app out/YugiohSammlung-macos-${{ matrix.arch }}/
          cp TESTER_LIESMICH.txt out/YugiohSammlung-macos-${{ matrix.arch }}/
          ditto -c -k --keepParent out/YugiohSammlung-macos-${{ matrix.arch }} YugiohSammlung-macos-${{ matrix.arch }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: YugiohSammlung-macos-${{ matrix.arch }}
          path: YugiohSammlung-macos-${{ matrix.arch }}.zip

  # Eigener Job statt Release-Schritt je Matrix-Eintrag: beide Builds haengen
  # ihre ZIPs gesammelt an, ohne sich beim Anlegen des Release zu ueberholen.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
